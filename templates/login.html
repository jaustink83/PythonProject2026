{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="logo-row">
            <div class="dot"></div>
            <span>GradePredictor</span>
        </div>

        <h2>Welcome back</h2>
        <p class="sub">Log in to predict your grade and view your history.</p>

        <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="your_username" required autocomplete="username" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            </div>

            <div class="remember-row">
                <input type="checkbox" id="remember" name="remember" />
                <label for="remember">Keep me logged in</label>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-full">Log in</button>
        </form>

        <p class="auth-footer">
            No account yet?
            <a href="{{ url_for('register') }}">Create one — it's free</a>
        </p>
    </div>
</div>
{% endblock %}
